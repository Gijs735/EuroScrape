<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Brussels to Paris Weekend Trains</title>
    <link rel="stylesheet" href="styles.css?v=20260621-0325">
    <style>
      @media (max-width: 720px) {
        .route-title {
          display: grid !important;
          grid-template-columns: auto auto !important;
          grid-template-areas:
            "origin connector"
            "destination destination"
            "returns returns" !important;
          min-height: 3.1em !important;
        }

        #origin-city {
          grid-area: origin;
        }

        .route-title .title-city {
          justify-self: start !important;
        }

        #destination-city {
          grid-area: destination;
        }

        .route-title .title-word:first-of-type {
          grid-area: connector;
        }

        .route-title .title-word:last-child {
          grid-area: returns;
        }

        .schedule-select,
        .schedule-select-button {
          width: 100% !important;
          min-width: 100% !important;
        }

        .data-select-wrap {
          width: 100% !important;
        }

        .filter-panel:not(.is-local-file) .checkbox-wrap {
          grid-column: auto !important;
          justify-self: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <main class="dashboard">
      <header class="dashboard-header">
        <div>
          <p class="eyebrow">Eurostar Weekend Dashboard</p>
          <h1 class="route-title" id="route-title">
            <button class="title-city" id="origin-city" type="button" aria-label="Current first leg starts in Brussels. Click to swap direction.">Brussels</button>
            <span class="title-word">to</span>
            <button class="title-city title-city-destination" id="destination-city" type="button" aria-label="Current first leg goes to Paris. Click to swap direction.">Paris</button>
            <span class="title-word">returns</span>
          </h1>
          <p class="route-subtitle">Click a city to flip the route</p>
        </div>
        <p id="last-updated">Loading prices...</p>
      </header>

      <section class="filter-panel" aria-label="Journey filters">
        <div class="data-select-wrap" id="server-data-wrap">
          <span class="filter-title">Schedule:</span>
          <div class="schedule-select" id="json-source">
            <button class="schedule-select-button" id="json-source-button" type="button" aria-haspopup="listbox" aria-expanded="false">
              <span id="json-source-label">Gijs's schedule</span>
            </button>
            <div class="schedule-select-menu" id="json-source-menu" role="listbox" hidden>
              <button class="schedule-option is-selected" type="button" role="option" data-file="eurostar_prices.json" aria-selected="true">Gijs's schedule</button>
            </div>
          </div>
        </div>
        <label class="price-input-wrap" for="expensive-price">
          <span class="filter-title">Price warning:</span>
          <span class="input-shell input-shell-expensive">
            <span>€</span>
            <input id="expensive-price" type="number" min="0" step="1" value="70">
          </span>
        </label>
        <label class="price-input-wrap" for="maximum-price">
          <span class="filter-title">Maximum price:</span>
          <span class="input-shell input-shell-maximum">
            <span>€</span>
            <input id="maximum-price" type="number" min="0" step="1" value="100">
          </span>
        </label>
        <label class="checkbox-wrap" for="hide-over-maximum">
          <input id="hide-over-maximum" type="checkbox" checked>
          <span class="filter-title">Hide above maximum</span>
        </label>
      </section>

      <section class="local-data-panel" id="local-data-panel" hidden>
        <div>
          <p class="filter-title">Open local data</p>
          <p>Select the generated <code>eurostar_prices.json</code> file to load this dashboard without a web server.</p>
        </div>
        <label class="file-input-wrap" for="local-json-file">
          Choose JSON
          <input id="local-json-file" type="file" accept="application/json,.json">
        </label>
      </section>

      <details class="calendar-panel" id="calendar-panel">
        <summary class="calendar-tab">
          <span class="calendar-tab-title">Price calendar</span>
          <span class="calendar-tab-icon" aria-hidden="true"></span>
        </summary>
        <div class="calendar-body">
          <div class="calendar-legend" aria-label="Calendar price legend">
            <span class="legend-badge is-good"><i class="legend-dot"></i>Good</span>
            <span class="legend-badge is-expensive"><i class="legend-dot"></i>Price warning</span>
            <span class="legend-badge is-over-maximum"><i class="legend-dot"></i>Over maximum</span>
          </div>
          <div class="calendar-years" id="calendar-years"></div>
        </div>
      </details>

      <section class="journey-grid" id="journey-grid" aria-live="polite"></section>
    </main>

    <template id="journey-card-template">
      <article class="journey-card">
        <div class="journey-card-header">
          <div>
            <p class="route-label">Friday to Sunday</p>
            <h3 class="travel-dates"></h3>
          </div>
        </div>
        <dl class="journey-details">
          <div>
            <dt>Departure time</dt>
            <dd class="departure-times"></dd>
          </div>
          <div>
            <dt>Total price</dt>
            <dd class="total-price"></dd>
          </div>
        </dl>
      </article>
    </template>

    <script src="app.js?v=20260621-0325"></script>
  </body>
</html>
